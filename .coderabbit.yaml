# CodeRabbit configuration for debate-furnace
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  high_level_summary_instructions: |
    Create concise release notes as a bullet-point list of user-facing changes,
    fixes, and technical notes. Follow with a Markdown table showing lines added
    and removed by each contributing author.
  poem: false
  sequence_diagrams: false
  path_instructions:
    - path: "api/**/*.js"
      instructions: |
        - Check for runtime regressions in serverless functions and API handlers.
        - Flag template literal escaping issues, environment variable assumptions,
          and missing error handling.
        - Prefer minimal, safe changes that preserve existing behavior.
    - path: "src/**/*.{js,jsx,ts,tsx}"
      instructions: |
        - Review UI behavior, accessibility, and regression risk.
        - Flag state management issues, broken component props, and brittle tests.
        - Prefer small, maintainable changes with clear user impact.
    - path: "**/*.{js,jsx,ts,tsx}"
      instructions: |
        - Prefer concise, maintainable code.
        - Flag potential regressions, security issues, and missing tests.
        - Suggest minimal, targeted fixes.
